services:
  postgres:
    image: postgres:16-alpine
    container_name: meridian-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: meridian
      POSTGRES_PASSWORD: meridian_dev_password
      POSTGRES_DB: meridian
    ports:
      - "5432:5432"
    volumes:
      - meridian_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meridian -d meridian"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  meridian_postgres_data:
